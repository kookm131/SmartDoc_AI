server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: smartdoc-document
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:h2:mem:smartdoc;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

smartdoc:
  local-upload-dir: ${SMARTDOC_LOCAL_UPLOAD_DIR:.smartdoc/uploads}
  max-upload-bytes: ${SMARTDOC_MAX_UPLOAD_BYTES:10485760}

logging:
  level:
    root: INFO
    com.smartdoc.document: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: mariadb
  datasource:
    url: ${SMARTDOC_DOCUMENT_DATASOURCE_URL:jdbc:mariadb://${SMARTDOC_DB_HOST:localhost}:${SMARTDOC_DB_PORT:3306}/smartdoc_document?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${SMARTDOC_DB_USERNAME:smartdoc}
    password: ${SMARTDOC_DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
