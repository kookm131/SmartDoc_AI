server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: smartdoc-document
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:h2:mem:smartdoc;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

smartdoc:
  local-upload-dir: ${SMARTDOC_LOCAL_UPLOAD_DIR:.smartdoc/uploads}

logging:
  level:
    root: INFO
    com.smartdoc.document: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
