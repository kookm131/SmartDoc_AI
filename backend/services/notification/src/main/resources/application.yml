server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: smartdoc-notification
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:h2:mem:smartdoc_notification;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    root: INFO
    com.smartdoc.notification: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
