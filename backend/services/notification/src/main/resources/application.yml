server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: smartdoc-notification
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:h2:mem:smartdoc_notification;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: ${SMARTDOC_JPA_SHOW_SQL:false}

logging:
  level:
    root: INFO
    com.smartdoc.notification: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

---
spring:
  config:
    activate:
      on-profile: mariadb
  datasource:
    url: ${SMARTDOC_NOTIFICATION_DATASOURCE_URL:jdbc:mariadb://${SMARTDOC_DB_HOST:localhost}:${SMARTDOC_DB_PORT:3306}/smartdoc_notification?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${SMARTDOC_DB_USERNAME:smartdoc}
    password: ${SMARTDOC_DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
