server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: smartdoc-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartdoc_gateway;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

smartdoc:
  document:
    base-url: ${SMARTDOC_DOCUMENT_BASE_URL:http://localhost:8081}
  analysis:
    base-url: ${SMARTDOC_ANALYSIS_BASE_URL:http://localhost:8082}
  notification:
    base-url: ${SMARTDOC_NOTIFICATION_BASE_URL:http://localhost:8083}
  upstream:
    connect-timeout-ms: ${SMARTDOC_UPSTREAM_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${SMARTDOC_UPSTREAM_READ_TIMEOUT_MS:3000}
  auth:
    jwt-secret: ${SMARTDOC_AUTH_JWT_SECRET:smartdoc-local-dev-secret-change-me}
    access-token-ttl-seconds: ${SMARTDOC_AUTH_ACCESS_TOKEN_TTL_SECONDS:86400}
    dev-email: ${SMARTDOC_AUTH_DEV_EMAIL:test@smartdoc.local}
    dev-password: ${SMARTDOC_AUTH_DEV_PASSWORD:password}
    dev-display-name: ${SMARTDOC_AUTH_DEV_DISPLAY_NAME:SmartDoc Tester}

logging:
  level:
    root: INFO
    com.smartdoc.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
