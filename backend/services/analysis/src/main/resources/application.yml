server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: smartdoc-analysis
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:h2:mem:smartdoc_analysis;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: ${SMARTDOC_JPA_SHOW_SQL:false}

smartdoc:
  document:
    base-url: ${SMARTDOC_DOCUMENT_BASE_URL:http://localhost:8081}
    connect-timeout-ms: ${SMARTDOC_DOCUMENT_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${SMARTDOC_DOCUMENT_READ_TIMEOUT_MS:2000}
  notification:
    base-url: ${SMARTDOC_NOTIFICATION_BASE_URL:http://localhost:8083}
    connect-timeout-ms: ${SMARTDOC_NOTIFICATION_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${SMARTDOC_NOTIFICATION_READ_TIMEOUT_MS:2000}

logging:
  level:
    root: INFO
    com.smartdoc.analysis: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

---
spring:
  config:
    activate:
      on-profile: mariadb
  datasource:
    url: ${SMARTDOC_ANALYSIS_DATASOURCE_URL:jdbc:mariadb://${SMARTDOC_DB_HOST:localhost}:${SMARTDOC_DB_PORT:3306}/smartdoc_analysis?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${SMARTDOC_DB_USERNAME:smartdoc}
    password: ${SMARTDOC_DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
