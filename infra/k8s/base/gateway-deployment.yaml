apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-gateway
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-gateway
  template:
    metadata:
      labels:
        app: smartdoc-gateway
    spec:
      containers:
        - name: gateway
          image: smartdoc/gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
