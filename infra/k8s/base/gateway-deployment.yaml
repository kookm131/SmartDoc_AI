apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-gateway
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-gateway
  template:
    metadata:
      labels:
        app: smartdoc-gateway
    spec:
      containers:
        - name: gateway
          image: smartdoc/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: smartdoc-app-config
            - secretRef:
                name: smartdoc-app-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
