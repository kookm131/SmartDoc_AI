apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-notification
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-notification
  template:
    metadata:
      labels:
        app: smartdoc-notification
    spec:
      containers:
        - name: notification
          image: smartdoc/notification:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: smartdoc-app-config
            - secretRef:
                name: smartdoc-app-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
