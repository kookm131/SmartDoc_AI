apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-notification
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-notification
  template:
    metadata:
      labels:
        app: smartdoc-notification
    spec:
      containers:
        - name: notification
          image: smartdoc/notification:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
