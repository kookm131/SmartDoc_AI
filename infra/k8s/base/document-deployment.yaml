apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-document
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-document
  template:
    metadata:
      labels:
        app: smartdoc-document
    spec:
      containers:
        - name: document
          image: smartdoc/document:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: smartdoc-app-config
            - secretRef:
                name: smartdoc-app-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
