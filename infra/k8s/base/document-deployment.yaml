apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-document
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-document
  template:
    metadata:
      labels:
        app: smartdoc-document
    spec:
      containers:
        - name: document
          image: smartdoc/document:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
