apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-document
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-document
  template:
    metadata:
      labels:
        app: smartdoc-document
    spec:
      containers:
        - name: document
          image: smartdoc/document:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: smartdoc-app-config
            - secretRef:
                name: smartdoc-app-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 5
            failureThreshold: 36
