apiVersion: v1
kind: Secret
metadata:
  name: smartdoc-app-secret
  namespace: smartdoc
type: Opaque
stringData:
  # Do not commit real secrets. Replace values at deploy time.
  SMARTDOC_PLACEHOLDER_TOKEN: replace-me

  # Gateway auth
  SMARTDOC_AUTH_JWT_SECRET: change-me-to-a-long-random-secret
  SMARTDOC_AUTH_DEV_PASSWORD: password
