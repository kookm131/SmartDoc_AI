apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-analysis
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-analysis
  template:
    metadata:
      labels:
        app: smartdoc-analysis
    spec:
      containers:
        - name: analysis
          image: smartdoc/analysis:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: smartdoc-app-config
            - secretRef:
                name: smartdoc-app-secret
          env:
            - name: SMARTDOC_DOCUMENT_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: smartdoc-app-config
                  key: SMARTDOC_DOCUMENT_BASE_URL
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
