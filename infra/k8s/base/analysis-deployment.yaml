apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-analysis
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartdoc-analysis
  template:
    metadata:
      labels:
        app: smartdoc-analysis
    spec:
      containers:
        - name: analysis
          image: smartdoc/analysis:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
