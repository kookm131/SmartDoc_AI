      containers:
        - name: document
          imagePullPolicy: IfNotPresent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-analysis
  namespace: smartdoc
spec:
  template:
    spec:
      containers:
        - name: analysis
          imagePullPolicy: IfNotPresent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-notification
  namespace: smartdoc
spec:
  template:
    spec:
      containers:
        - name: notification
          imagePullPolicy: IfNotPresent

