apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdoc-gateway
  namespace: smartdoc
spec:
  template:
    spec:
      containers:
        - name: gateway
          imagePullPolicy: IfNotPresent
---
apiVersion: apps/v1
kind: Deployment
metadata:
