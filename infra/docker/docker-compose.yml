services:
  gateway:
    build:
      context: ../../backend/services/gateway
    image: smartdoc/gateway:local
    container_name: smartdoc-gateway
    environment:
      SPRING_PROFILES_ACTIVE: local
      SMARTDOC_DOCUMENT_BASE_URL: http://document:8081
      SMARTDOC_ANALYSIS_BASE_URL: http://analysis:8082
      SMARTDOC_NOTIFICATION_BASE_URL: http://notification:8083
      SMARTDOC_UPSTREAM_CONNECT_TIMEOUT_MS: "1000"
      SMARTDOC_UPSTREAM_READ_TIMEOUT_MS: "3000"
      SMARTDOC_AUTH_JWT_SECRET: smartdoc-local-dev-secret-change-me
      SMARTDOC_AUTH_ACCESS_TOKEN_TTL_SECONDS: "86400"
      SMARTDOC_AUTH_DEV_EMAIL: test@smartdoc.local
      SMARTDOC_AUTH_DEV_PASSWORD: password
      SMARTDOC_AUTH_DEV_DISPLAY_NAME: SmartDoc Tester
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    ports:
      - "8080:8080"
    depends_on:
      document:
        condition: service_healthy
      analysis:
        condition: service_healthy
      notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  document:
    build:
      context: ../../backend/services/document
    image: smartdoc/document:local
    container_name: smartdoc-document
    environment:
      SPRING_PROFILES_ACTIVE: local
      SMARTDOC_LOCAL_UPLOAD_DIR: .smartdoc/uploads
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  analysis:
    build:
      context: ../../backend/services/analysis
    image: smartdoc/analysis:local
    container_name: smartdoc-analysis
    environment:
      SPRING_PROFILES_ACTIVE: local
      SMARTDOC_DOCUMENT_BASE_URL: http://document:8081
      SMARTDOC_NOTIFICATION_BASE_URL: http://notification:8083
      SMARTDOC_DOCUMENT_CONNECT_TIMEOUT_MS: "1000"
      SMARTDOC_DOCUMENT_READ_TIMEOUT_MS: "2000"
      SMARTDOC_NOTIFICATION_CONNECT_TIMEOUT_MS: "1000"
      SMARTDOC_NOTIFICATION_READ_TIMEOUT_MS: "2000"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    ports:
      - "8082:8082"
    depends_on:
      document:
        condition: service_healthy
      notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  notification:
    build:
      context: ../../backend/services/notification
    image: smartdoc/notification:local
    container_name: smartdoc-notification
    environment:
      SPRING_PROFILES_ACTIVE: local
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
